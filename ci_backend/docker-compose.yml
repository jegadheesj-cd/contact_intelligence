version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: contact-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contact_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: contact-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contact-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/contact_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=super-secret-access-token-key-change-in-production
      - JWT_REFRESH_SECRET=super-secret-refresh-token-key-change-in-production
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
      - UPLOAD_DIR=/usr/src/app/uploads
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads_data:/usr/src/app/uploads

volumes:
  postgres_data:
  redis_data:
  uploads_data:
